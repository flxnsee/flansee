name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist/ via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: dist/
          remote_path: /var/www/flansee/
          remote_host: 77.90.45.31
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 77.90.45.31
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod -R a+rX /var/www/flansee
            echo "Deployed at $(date)"
