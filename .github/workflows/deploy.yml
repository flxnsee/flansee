name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: ./
          remote_path: /var/www/flansee/
          remote_host: 77.90.45.31
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 77.90.45.31
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            chmod 755 /var/www/flansee
            chmod 644 /var/www/flansee/*
            echo "Deployed at $(date)"
